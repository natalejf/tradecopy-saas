version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=change-this-to-a-random-secret
      - ADMIN_KEY=change-this-admin-key
      - DATABASE_URL=/data/tradecopy.db
    volumes:
      - db_data:/data
    restart: unless-stopped

volumes:
  db_data:
